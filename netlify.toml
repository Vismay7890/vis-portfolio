[build]
  # Build command for Vite project
  command = "npm run build"
  
  # Directory where built files are generated
  publish = "dist"

# Single Page Application (SPA) redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 3000

