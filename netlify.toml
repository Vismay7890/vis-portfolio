[build]
  # Build command for Vite project
  command = "npm run build"
  
  # Directory where built files are generated
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "OPENAI_EMBEDDING_MODEL,GROQ_CHAT_MODEL"

# Single Page Application (SPA) redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 3000

[functions]
  included_files = ["templates/**"]

